name: C/C++ CI

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cpp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native:
    name: C/C++ (CMake)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtest-dev ninja-build
      - name: Configure
        run: cmake -S . -B build -G Ninja -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${{ runner.temp }}/pbf-install"
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Verify installable package
        run: cmake --install build

  sanitizer:
    name: C/C++ (Clang ASan+UBSan, AVX2=${{ matrix.avx2 }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        avx2: ['OFF', 'ON']
    env:
      SANITIZER_FLAGS: -fsanitize=address,undefined -fno-sanitize=alignment -fno-sanitize-recover=all -fno-omit-frame-pointer
    steps:
      - uses: actions/checkout@v4
      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libgtest-dev ninja-build
      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -S . -B "build-sanitizer-${{ matrix.avx2 }}" -G Ninja \
            -DBUILD_TESTING=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DPBF_ENABLE_AVX2="${{ matrix.avx2 }}" \
            -DPBF_ENABLE_AESNI_HASH=OFF \
            -DCMAKE_CXX_FLAGS="${SANITIZER_FLAGS}" \
            -DCMAKE_EXE_LINKER_FLAGS="${SANITIZER_FLAGS}" \
            -DCMAKE_SHARED_LINKER_FLAGS="${SANITIZER_FLAGS}"
      - name: Build
        run: cmake --build "build-sanitizer-${{ matrix.avx2 }}" --parallel
      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir "build-sanitizer-${{ matrix.avx2 }}" --output-on-failure
