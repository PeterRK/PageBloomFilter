name: C/C++ CI

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cpp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native:
    name: C/C++ (CMake)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtest-dev ninja-build
      - name: Configure
        run: cmake -S . -B build -G Ninja -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${{ runner.temp }}/pbf-install"
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Verify installable package
        run: cmake --install build
